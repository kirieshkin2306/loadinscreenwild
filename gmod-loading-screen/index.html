<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#2b1a10"/>
    <rect x="30" y="55" width="40" height="30" fill="#6b4426"/>
    <polygon points="30,55 50,35 70,55" fill="#6b4426"/>
    <circle cx="50" cy="30" r="10" fill="#e8c99a"/>
  </svg>
</template>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0f0a06; }
  </style>
  <meta name="ext-resource-dependency" content="./animations.jsx" />
  <meta name="ext-resource-dependency" content="./ww-elements.jsx" />
  <meta name="ext-resource-dependency" content="./scene-b.jsx" />
</helmet>

<div style="position:fixed; inset:0; width:100vw; height:100vh; overflow:hidden; background:#0f0a06;">
  <div ref="{{ stageWrapRef }}" style="position:absolute; inset:0; width:100%; height:100%;">
    <x-import component-from-global-scope="SceneB" from="./animations.jsx ./ww-elements.jsx ./scene-b.jsx" hint-size="1920,1080"></x-import>
  </div>
  <audio ref="{{ audioRef }}" src="./audio/dusty-menu-plains.mp3" autoplay="{{ true }}" loop="{{ true }}" preload="auto" style="display:none"></audio>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    // Make the 1920x1080 stage fill the viewport (GMod loading screen is
    // rendered at the client's resolution) instead of the design-time 0.5 scale.
    const fit = () => {
      const wrap = this.stageWrapRef && this.stageWrapRef.current;
      if (!wrap) return;
      const frame = wrap.querySelector('[data-stage-canvas]') || wrap.querySelector('svg');
      // The Stage auto-scales itself to its container already; just make sure
      // the container is the full viewport (done via CSS) — nothing else needed.
    };
    fit();
    window.addEventListener('resize', fit);
    this._cleanupFit = () => window.removeEventListener('resize', fit);

    // Autoplay audio (loop is set on the element itself; this just nudges
    // playback in case the browser blocked the initial autoplay attempt).
    const tryPlay = () => {
      const a = this.audioRef && this.audioRef.current;
      if (!a) return;
      a.loop = true;
      const p = a.play();
      if (p && p.catch) p.catch(() => {
        const resume = () => { a.play().catch(() => {}); window.removeEventListener('click', resume); window.removeEventListener('keydown', resume); };
        window.addEventListener('click', resume, { once: true });
        window.addEventListener('keydown', resume, { once: true });
      });
    };
    tryPlay();
  }

  componentWillUnmount() {
    if (this._cleanupFit) this._cleanupFit();
  }

  renderVals() {
    return {
      stageWrapRef: this.stageWrapRef || (this.stageWrapRef = React.createRef()),
      audioRef: this.audioRef || (this.audioRef = React.createRef()),
    };
  }
}

</script>
</body>
</html>
